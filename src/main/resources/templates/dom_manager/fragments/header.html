<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Header Fragment -->
<div th:fragment="header" class="w-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm px-4 py-2">
        <div class="container-fluid">
            <!-- Toggler for mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarOffcanvas" aria-controls="sidebarOffcanvas">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <a class="navbar-brand fw-bold text-primary ms-2" href="#">Cổng thông tin Quản lý Dom</a>
            
            <div class="collapse navbar-collapse d-flex justify-content-end">
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle d-flex align-items-center" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="https://ui-avatars.com/api/?name=Manager&background=random" alt="Avatar" class="rounded-circle me-2" width="32" height="32">
                        <span class="fw-semibold text-secondary">Manager</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="userMenu">
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#">Đăng Xuất</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
</div>

</body>
</html>
