<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dom_manager/layout/base :: layout(content=~{::div.main-content}, activeTab='staff')}">
    <body>
        <div class="main-content">
            <div class="container-fluid">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold text-primary">Tạo Tài Khoản</h5>
                        <a th:href="@{/dom-manager/staff}"
                           class="btn btn-outline-secondary btn-sm px-3 shadow-sm rounded-pill">
                            <i class="bi bi-arrow-left me-1"></i>Back to List
                        </a>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/dom-manager/staff/create}" th:object="${staff}" method="post">

                            <div class="row g-3">
                                <!-- First Name -->
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label fw-semibold">First Name</label>
                                    <input type="text" class="form-control" id="firstName" th:field="*{firstName}"
                                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''"
                                           placeholder="Enter first name">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                                         th:errors="*{firstName}"></div>
                                </div>

                                <!-- Last Name -->
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label fw-semibold">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" th:field="*{lastName}"
                                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''"
                                           placeholder="Enter last name">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                                         th:errors="*{lastName}"></div>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6">
                                    <label for="email" class="form-label fw-semibold">Email</label>
                                    <input type="email" class="form-control" id="email" th:field="*{email}"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                           placeholder="Enter email">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}"></div>
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6">
                                    <label for="phone" class="form-label fw-semibold">Phone</label>
                                    <input type="text" class="form-control" id="phone" th:field="*{phone}"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                           placeholder="Enter phone number">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}"
                                         th:errors="*{phone}"></div>
                                </div>

                                <!-- Password -->
                                <div class="col-md-6">
                                    <label for="password" class="form-label fw-semibold">Password</label>
                                    <input type="password" class="form-control" id="password" th:field="*{password}"
                                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                           placeholder="Enter temporary password">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                         th:errors="*{password}"></div>
                                </div>

                                <!-- Gender -->
                                <div class="col-md-6">
                                    <label for="gender" class="form-label fw-semibold">Gender</label>
                                    <select class="form-select" id="gender" th:field="*{gender}"
                                            th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid' : ''">
                                        <option value="" disabled selected>Select gender</option>
                                        <option value="MALE">Male</option>
                                        <option value="FEMALE">Female</option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('gender')}"
                                         th:errors="*{gender}"></div>
                                </div>

                                <!-- Floor -->
                                <div class="col-md-6">
                                    <label for="floorId" class="form-label fw-semibold">Assign to Floor</label>
                                    <select class="form-select" id="floorId" th:field="*{floorId}"
                                            th:classappend="${#fields.hasErrors('floorId')} ? 'is-invalid' : ''">
                                        <option value="" disabled selected>Select floor</option>
                                        <option th:each="floor : ${floors}"
                                                th:value="${floor.id}"
                                                th:text="'Floor ' + ${floor.floorNumber}">Floor 1
                                        </option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('floorId')}"
                                         th:errors="*{floorId}"></div>
                                    <div class="form-text text-muted small mt-1">
                                        <i class="bi bi-info-circle me-1"></i>You can only assign staff to floors in
                                        your building.
                                    </div>
                                </div>
                            </div>

                            <hr class="my-4">

                            <div class="d-flex justify-content-end">
                                <button type="reset" class="btn btn-light border me-2">Clear</button>
                                <button type="submit" class="btn btn-primary px-4 shadow-sm">Save Staff</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
