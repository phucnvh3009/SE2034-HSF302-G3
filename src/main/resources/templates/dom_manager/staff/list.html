<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{dom_manager/layout/base :: layout(content=~{::div.main-content}, activeTab='staff')}">

    <body>
        <div class="main-content">
            <div class="container-fluid">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold text-primary">Dormitory Staff Accounts</h5>
                        <a th:href="@{/dom-manager/staff/create}"
                           class="btn btn-primary btn-sm px-3 shadow-sm rounded-pill">+ Tạo Tài Khoản</a>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">STT</th>
                                        <th>Họ Và Tên</th>
                                        <th>Email</th>
                                        <th>Số Điện Thoại</th>
                                        <th>Giới Tính</th>
                                        <th>Trạng Thái</th>
                                        <th class="text-end pe-4">Thao Tác</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    <tr th:each="staff, iterStat : ${staffs}">
                                        <td class="ps-4 text-muted" th:text="${iterStat.count}">1</td>
                                        <td class="fw-semibold text-dark" th:text="${staff.fullName}">Nguyen Van A</td>
                                        <td th:text="${staff.email}">staff@fpt.edu.vn</td>
                                        <td th:text="${staff.phone}">0987654321</td>
                                        <td>
                                            <span th:if="${staff.gender == 'MALE'}"
                                                  class="badge bg-info bg-opacity-10 text-info border border-info rounded-pill px-2">Male</span>
                                            <span th:if="${staff.gender == 'FEMALE'}"
                                                  class="badge bg-danger bg-opacity-10 text-danger border border-danger rounded-pill px-2">Female</span>
                                        </td>
                                        <td>
                                            <span th:if="${staff.isActive}"
                                                  class="badge bg-success bg-opacity-10 text-success border border-success rounded-pill px-2"><i
                                                    class="bi bi-circle-fill small me-1"></i>Active</span>
                                            <span th:unless="${staff.isActive}"
                                                  class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary rounded-pill px-2">Inactive</span>
                                        </td>
                                        <td class="text-end pe-4">
                                            <a href="#" class="btn btn-sm btn-light text-primary border">View</a>
                                            <a href="#" class="btn btn-sm btn-light text-secondary border ms-1">Edit</a>
                                        </td>
                                    </tr>

                                    <tr th:if="${#lists.isEmpty(staffs)}">
                                        <td colspan="7" class="text-center text-muted py-4">
                                            <div class="mb-2">Không tìm thấy tài khoản nhân viên nào.</div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
