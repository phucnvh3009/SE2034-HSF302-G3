<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, activeTab)">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dom Manager System</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        <style>
            body {
                background-color: #f8f9fa;
            }

            /* Custom scrollbar for main content */
            .main-content-scrollable {
                max-height: 100vh;
                overflow-y: auto;
            }
        </style>
    </head>
    <body>
        <div class="d-flex" style="min-height: 100vh;">
            <!-- Sidebar inclusion -->
            <div th:replace="~{dom_manager/fragments/sidebar :: sidebar(activeTab=${activeTab})}"></div>

            <!-- Main Content Area -->
            <div class="flex-grow-1 d-flex flex-column" style="max-width: calc(100% - 250px);">
                <!-- Header inclusion -->
                <div th:replace="~{dom_manager/fragments/header :: header}"></div>

                <!-- Dynamic Content injected here -->
                <div class="main-content-scrollable p-4 flex-grow-1">
                    <div th:replace="${content}"></div>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
