<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>
<div th:replace="~{views/admin/layout :: layout('Quản lý Ban quản lý KTX', 'listManager.css', ~{::content})}">
    <div th:fragment="content">

        <!--Thanh Tìm kiếm và Lọc trạng thái -->
        <div class="card" style="margin-bottom: 20px; padding: 15px 20px;">

            <form th:action="@{/admin/listManager}" method="get" style="display: flex; gap: 15px; align-items: center; justify-content: space-between; flex-wrap: wrap;">
                <div style="display: flex; gap: 12px; flex: 1; min-width: 300px;">
                    <input type="text" name="keyword" th:value="${keyword}"
                           placeholder="Tìm kiếm theo tên hoặc gmail..."
                           style="flex: 1; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none;" />

                    <select name="status" style="padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; background-color: white;">
                        <option value="" th:selected="${status == null}">-- Tất cả trạng thái --</option>
                        <option value="true" th:selected="${status == true}">Hoạt động</option>
                        <option value="false" th:selected="${status == false}">Đã khóa</option>
                    </select>

                    <button type="submit" class="btn btn-primary" style="padding: 10px 20px;">Tìm kiếm</button>

                    <a th:href="@{/admin/listManager}" class="btn btn-secondary" style="padding: 10px 16px; text-decoration: none; display: inline-flex; align-items: center;">Xóa lọc</a>
                </div>

                <div>
                    <a th:href="@{/admin/listManager/create}" class="btn btn-primary" style="padding: 10px 20px;">Thêm Mới Quản Lý</a>
                </div>
            </form>
        </div>

        <!--Bảng Danh sách Dorm Managers -->
        <div class="card">
            <div class="card-title">Danh sách Quản lý tòa nhà</div>
            <div class="table-container">
                <table class="custom-table">
                    <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">STT</th>
                        <th>Họ và Tên</th>
                        <th>Gmail</th>
                        <th style="width: 150px; text-align: center;">Ngày tạo</th>
                        <th style="width: 120px; text-align: center;">Trạng thái</th>
                        <th style="width: 180px; text-align: center;">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="mgr, iterStat : ${managers}">
                        <td style="text-align: center;" th:text="${iterStat.count}">1</td>
                        <td><strong th:text="${mgr.fullName}">Trống</strong></td>
                        <td th:text="${mgr.email}">Trống</td>
                        <td style="text-align: center;" th:text="${#temporals.format(mgr.createdAt, 'dd-MM-yyyy', 'Asia/Ho_Chi_Minh')}">01-07-2026</td>
                        <td style="text-align: center;">
                            <span th:if="${mgr.isActive}" class="badge badge-success">Hoạt động</span>
                            <span th:unless="${mgr.isActive}" class="badge badge-danger">Đã khóa</span>
                        </td>
                        <td style="text-align: center;">
                            <div style="display: flex; gap: 8px; justify-content: center;">
                                <a th:href="@{/admin/listManager/{id}(id=${mgr.id})}" class="btn btn-secondary btn-sm">Chi Tiết</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(managers)}">
                        <td colspan="6" style="text-align: center; color: #64748b; padding: 30px;">
                            Không có tìm thấy ai phù hợp với điều kiện tìm kiếm.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
